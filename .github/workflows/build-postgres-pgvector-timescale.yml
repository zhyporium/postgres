name: Build postgres-pgvector-timescale

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/18/pgvector-timescale/**
      - docker/18/common/**
      - .github/workflows/build-postgres-pgvector-timescale.yml
      - .github/workflows/_reusable-build.yml

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_reusable-build.yml
    with:
      tag: "18_vt"
      context: docker/18
      dockerfile: docker/18/pgvector-timescale/Dockerfile
